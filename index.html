<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — locked portrait, no zoom, safe-area aware -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Varadhi — India's Emergency Corridor</title>
    <meta name="description" content="Varadhi is India's real-time emergency response platform connecting citizens with responders, hospitals, and hazard alerts." />
    <meta name="keywords" content="emergency, road safety, SOS, India, accident, responder, Varadhi" />
    <meta name="author" content="Varadhi" />

    <!-- Theme -->
    <meta name="theme-color" content="#FF2D2D" />
    <meta name="msapplication-navbutton-color" content="#FF2D2D" />
    <meta name="msapplication-TileColor" content="#FF2D2D" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Varadhi" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Open Graph (optional but good for sharing) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Varadhi — India's Emergency Corridor" />
    <meta property="og:description" content="India's First Automated Emergency Corridor" />
    <meta property="og:image"       content="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
