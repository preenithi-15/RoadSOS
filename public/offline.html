<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Varadhi — Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Outfit', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px 28px;
      max-width: 380px;
    }

    .logo-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid rgba(255, 45, 45, 0.5);
      box-shadow: 0 0 28px rgba(255, 45, 45, 0.3), inset 0 0 28px rgba(255, 45, 45, 0.05);
      overflow: hidden;
      margin-bottom: 32px;
      animation: breathe 3s ease-in-out infinite;
    }

    .logo-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 20px rgba(255,45,45,0.25), inset 0 0 20px rgba(255,45,45,0.04); }
      50%       { box-shadow: 0 0 40px rgba(255,45,45,0.5),  inset 0 0 30px rgba(255,45,45,0.08); }
    }

    .wordmark {
      font-weight: 200;
      font-size: 1.8rem;
      letter-spacing: 0.28em;
      text-transform: lowercase;
      color: #fff;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 40px;
    }

    .signal-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,45,45,0.1);
      border: 1px solid rgba(255,45,45,0.25);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .headline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .body-text {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 10px;
      width: 100%;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.red    { background: #FF2D2D; animation: blink 1.5s ease-in-out infinite; }
    .dot.yellow { background: #F59E0B; }
    .dot.green  { background: #22C55E; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .status-label { font-size: 12px; color: rgba(255,255,255,0.45); flex: 1; }
    .status-val   { font-size: 11px; font-weight: 600; }
    .status-val.red    { color: #FF6B6B; }
    .status-val.yellow { color: #FCD34D; }
    .status-val.green  { color: #4ADE80; }

    .retry-btn {
      margin-top: 28px;
      background: #FF2D2D;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 32px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.06em;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .retry-btn:active { opacity: 0.8; }

    .emergency-note {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      line-height: 1.5;
    }

    .emergency-note a {
      color: rgba(255,45,45,0.7);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-ring">
      <img src="/road.jpeg" alt="Varadhi" />
    </div>

    <div class="wordmark">varadhi</div>
    <div class="tagline">India's Emergency Corridor</div>

    <div class="signal-icon">📡</div>
    <div class="headline">You're offline</div>
    <div class="body-text">
      Varadhi will resume when connected.<br />
      Emergency features will restore automatically.
    </div>

    <!-- System status rows -->
    <div class="status-row">
      <div class="dot red"></div>
      <span class="status-label">Network connection</span>
      <span class="status-val red">No signal</span>
    </div>
    <div class="status-row">
      <div class="dot yellow"></div>
      <span class="status-label">Varadhi corridor</span>
      <span class="status-val yellow">Standby</span>
    </div>
    <div class="status-row">
      <div class="dot green"></div>
      <span class="status-label">App cache</span>
      <span class="status-val green">Ready</span>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      Retry connection
    </button>

    <div class="emergency-note">
      For life-threatening emergencies, always call<br />
      <a href="tel:112">112 (National Emergency)</a> directly.
    </div>
  </div>
</body>
</html>
